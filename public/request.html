<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Request AI Service | EastWest Help</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 p-10">
    <div class="max-w-2xl mx-auto bg-white p-8 rounded-xl border border-slate-200 shadow-sm">
        <h2 class="text-2xl font-bold mb-6">Request AI Automation</h2>
        <form action="mailto:tok@eastwesthelp.com" method="post" enctype="text/plain">
            <div class="mb-4">
                <label class="block text-sm font-medium mb-1">Your Name</label>
                <input type="text" name="name" class="w-full p-2 border border-slate-300 rounded" required>
            </div>
            <div class="mb-4">
                <label class="block text-sm font-medium mb-1">What AI Service/Automation do you need?</label>
                <textarea name="request" class="w-full p-2 border border-slate-300 rounded" rows="4" required></textarea>
            </div>
            <button type="submit" class="bg-blue-600 text-white px-6 py-2 rounded-lg font-semibold hover:bg-blue-700">Submit Request</button>
        </form>
    </div>
</body>
